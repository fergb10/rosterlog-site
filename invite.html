<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RosterLog — Invitación de Espectador</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; line-height: 1.6; color: #1d1d1f; background: #f5f5f7; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 24px; }
        .card { background: #fff; border-radius: 20px; padding: 40px 32px; max-width: 380px; width: 100%; text-align: center; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
        .icon { font-size: 56px; margin-bottom: 16px; }
        h1 { font-size: 22px; margin-bottom: 8px; }
        .code { font-family: monospace; font-size: 28px; font-weight: 700; color: #007aff; letter-spacing: 2px; margin: 16px 0; }
        p { font-size: 15px; color: #666; margin-bottom: 20px; }
        .btn { display: inline-block; background: #007aff; color: #fff; text-decoration: none; padding: 14px 32px; border-radius: 12px; font-size: 17px; font-weight: 600; }
        .btn:hover { background: #0056cc; }
        .note { font-size: 13px; color: #999; margin-top: 16px; }
    </style>
    <script>
        const params = new URLSearchParams(window.location.search);
        const code = params.get('code') || '';
        document.addEventListener('DOMContentLoaded', function() {
            if (code) {
                document.getElementById('code').textContent = code;
            }
        });
    </script>
</head>
<body>
    <div class="card">
        <div class="icon">✈️</div>
        <h1>Te invitaron a RosterLog</h1>
        <p>Usa este código para ver el calendario de vuelos de tu tripulante.</p>
        <div class="code" id="code">--------</div>
        <a class="btn" href="https://apps.apple.com/mx/app/rosterlog/id6740038094">Descargar RosterLog</a>
        <p class="note">Si ya tienes la app, ábrela y selecciona "Entrar como espectador" con este código.</p>
    </div>
</body>
</html>
